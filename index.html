<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Myntra RA · Program Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#f0f0f0}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#e11d74;border-radius:3px}
input,select,textarea{font-family:'Inter',sans-serif}
input[type=range]{accent-color:#e11d74}
table{border-collapse:collapse;width:100%}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo,useEffect,useCallback}=React;

// ── Supabase ──────────────────────────────────────────────────────────────
const SB_URL="https://fhmjyavhnkrioqamtuvw.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZobWp5YXZobmtyaW9xYW10dXZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTAxNTYsImV4cCI6MjA4ODc4NjE1Nn0.8FCECJ_vIvCimJm4d8a-6y_cIHjO9knEwCnJw-azrXo";
const H={"Content-Type":"application/json","apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`};
async function dbGet(){const r=await fetch(`${SB_URL}/rest/v1/programs?select=*&order=created_at.desc`,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json();}
async function dbInsert(row){const r=await fetch(`${SB_URL}/rest/v1/programs`,{method:"POST",headers:{...H,"Prefer":"return=representation"},body:JSON.stringify(row)});if(!r.ok)throw new Error(await r.text());}
async function dbUpdate(id,row){const r=await fetch(`${SB_URL}/rest/v1/programs?id=eq.${id}`,{method:"PATCH",headers:{...H,"Prefer":"return=representation"},body:JSON.stringify(row)});if(!r.ok)throw new Error(await r.text());}
async function dbDelete(id){const r=await fetch(`${SB_URL}/rest/v1/programs?id=eq.${id}`,{method:"DELETE",headers:H});if(!r.ok)throw new Error(await r.text());}

// ── Constants ─────────────────────────────────────────────────────────────
const ROLES={"Muralidharan":"admin","Piyush":"admin","Fareed":"edit","Shivendra":"edit","Sesirekha":"edit","Gurutej":"view"};
const MEMBERS=Object.keys(ROLES);
const TYPES=["Monthly Control","AR Collaboration","Ad Hoc Investigation","Stakeholder Review"];
const STATUSES=["Not Started","In Progress","Blocked","Completed"];

const STATUS_COLORS={
  "Not Started":{bg:"#2a2a2a",text:"#aaa",dot:"#aaa"},
  "In Progress":{bg:"#1a1a3e",text:"#818cf8",dot:"#818cf8"},
  "Blocked":{bg:"#3e1a1a",text:"#f87171",dot:"#f87171"},
  "Completed":{bg:"#1a3e2a",text:"#34d399",dot:"#34d399"},
};
const TYPE_COLORS={
  "Monthly Control":{bg:"#2d1a3e",text:"#c084fc"},
  "AR Collaboration":{bg:"#3e2a1a",text:"#fb923c"},
  "Ad Hoc Investigation":{bg:"#3e3a1a",text:"#facc15"},
  "Stakeholder Review":{bg:"#1a3a3e",text:"#22d3ee"},
};

// ── Comment logic ─────────────────────────────────────────────────────────
function getAutoComment(item){
  const today=new Date(); today.setHours(0,0,0,0);
  const due=item.dueDate?new Date(item.dueDate):null;
  const closed=item.closedDate?new Date(item.closedDate):null;
  if(due) due.setHours(0,0,0,0);
  if(closed) closed.setHours(0,0,0,0);

  if(item.status==="Not Started") return{label:"Not Started",color:"#aaa",bg:"#2a2a2a",icon:"⚪"};
  if(item.status==="Completed"){
    if(!due||!closed) return{label:"Completed",color:"#34d399",bg:"#1a3e2a",icon:"✅"};
    if(closed<=due) return{label:"Closed within due date",color:"#34d399",bg:"#1a3e2a",icon:"✅"};
    return{label:"Closed — due date breached",color:"#fbbf24",bg:"#3e2a00",icon:"⚠️"};
  }
  if(item.status==="In Progress"||item.status==="Blocked"){
    if(!due) return{label:"WIP",color:"#818cf8",bg:"#1a1a3e",icon:"🔵"};
    if(today<=due) return{label:"WIP — within due date",color:"#818cf8",bg:"#1a1a3e",icon:"🔵"};
    return{label:"WIP — due date breached",color:"#f87171",bg:"#3e1a1a",icon:"🔴"};
  }
  return{label:"—",color:"#aaa",bg:"#2a2a2a",icon:""};
}

function getAgeing(item){
  const start=item.startDate?new Date(item.startDate):null;
  if(!start) return "—";
  const end=item.closedDate?new Date(item.closedDate):new Date();
  const days=Math.floor((end-start)/(1000*60*60*24));
  return days>=0?`${days}d`:"—";
}

const today=new Date(),todayStr=today.toISOString().split("T")[0];
const EMPTY={title:"",type:TYPES[0],owner:MEMBERS[0],startDate:todayStr,dueDate:"",closedDate:"",status:"Not Started",impact:"",riskBlocker:"",progress:0,notes:"",manualComment:""};

// ── Styles ────────────────────────────────────────────────────────────────
const S={
  wrap:{minHeight:"100vh",background:"#0a0a0a",padding:"20px",animation:"fadeIn 0.4s ease"},
  hdr:{background:"linear-gradient(135deg,#1a0a12 0%,#12001a 100%)",border:"1px solid #2a0a1a",borderRadius:16,padding:"20px 28px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between"},
  logoBox:{width:42,height:42,background:"linear-gradient(135deg,#e11d74,#9333ea)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,boxShadow:"0 0 20px #e11d7440"},
  addBtn:{background:"linear-gradient(135deg,#e11d74,#9333ea)",border:"none",color:"#fff",padding:"10px 20px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",boxShadow:"0 0 20px #e11d7450"},
  statCard:{background:"#111",border:"1px solid #222",borderRadius:14,padding:"18px 20px",position:"relative",overflow:"hidden"},
  filterBar:{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:"14px 20px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12},
  sel:{background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#ccc",padding:"8px 14px",borderRadius:8,fontSize:13,outline:"none"},
  tbl:{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,overflow:"hidden"},
  th:{background:"#0d0d0d",color:"#555",fontSize:10,textTransform:"uppercase",letterSpacing:1.2,padding:"14px 16px",textAlign:"left",fontWeight:600,borderBottom:"1px solid #1e1e1e",whiteSpace:"nowrap"},
  td:{padding:"12px 16px",borderBottom:"1px solid #141414",fontSize:13,color:"#ccc",verticalAlign:"middle"},
  overlay:{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20},
  modal:{background:"#111",border:"1px solid #2a2a2a",borderRadius:20,padding:28,width:"100%",maxWidth:580,animation:"slideUp 0.3s ease",maxHeight:"90vh",overflowY:"auto"},
  inp:{width:"100%",background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#e0e0e0",padding:"10px 14px",borderRadius:10,fontSize:13,outline:"none"},
  lbl:{fontSize:11,color:"#666",fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:5,display:"block"},
  saveBtn:{flex:1,background:"linear-gradient(135deg,#e11d74,#9333ea)",border:"none",color:"#fff",padding:"12px",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer"},
  cancelBtn:{flex:1,background:"transparent",border:"1px solid #2a2a2a",color:"#888",padding:"12px",borderRadius:10,fontSize:14,cursor:"pointer"},
  loginWrap:{minHeight:"100vh",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center"},
  loginCard:{background:"#111",border:"1px solid #2a2a2a",borderRadius:24,padding:40,width:340,textAlign:"center",boxShadow:"0 4px 24px rgba(0,0,0,0.5)"},
};

function badge(meta){return{display:"inline-flex",alignItems:"center",gap:5,background:meta?.bg||"#222",color:meta?.text||"#aaa",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600};}
function vBtn(active){return{background:active?"linear-gradient(135deg,#e11d74,#9333ea)":"transparent",border:active?"none":"1px solid #2a2a2a",color:active?"#fff":"#666",padding:"7px 16px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"};}
function Spin(){return <div style={{width:28,height:28,border:"3px solid #2a2a2a",borderTop:"3px solid #e11d74",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"60px auto"}}/>;}
function fmtD(d){return d?new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}):"—";}

function App(){
  const[user,setUser]=useState(null);
  const[items,setItems]=useState([]);
  const[loading,setLoading]=useState(false);
  const[showForm,setShowForm]=useState(false);
  const[editId,setEditId]=useState(null);
  const[form,setForm]=useState(EMPTY);
  const[filters,setFilters]=useState({owner:"All",type:"All",status:"All"});
  const[view,setView]=useState("table");
  const[expandedId,setExpandedId]=useState(null);
  const[hovId,setHovId]=useState(null);
  const[saving,setSaving]=useState(false);
  const[toast,setToast]=useState(null);

  const role=user?ROLES[user]:null,canEdit=role==="admin"||role==="edit",isAdmin=role==="admin";
  function showToast(msg,type="success"){setToast({msg,type});setTimeout(()=>setToast(null),3500);}
  function f(k,v){setForm(x=>({...x,[k]:v}));}

  const loadData=useCallback(async()=>{
    setLoading(true);
    try{const data=await dbGet();setItems(data||[]);}
    catch(e){showToast("Load failed: "+e.message,"error");}
    setLoading(false);
  },[]);

  useEffect(()=>{if(user)loadData();},[user]);

  const filtered=useMemo(()=>items.filter(i=>
    (filters.owner==="All"||i.owner===filters.owner)&&
    (filters.type==="All"||i.type===filters.type)&&
    (filters.status==="All"||i.status===filters.status)
  ),[items,filters]);

  const stats=useMemo(()=>({
    total:filtered.length,
    inProgress:filtered.filter(i=>i.status==="In Progress").length,
    blocked:filtered.filter(i=>i.status==="Blocked").length,
    breached:filtered.filter(i=>{
      const c=getAutoComment(i);
      return c.label.includes("breached");
    }).length,
    impact:filtered.reduce((s,i)=>s+(parseFloat(i.impact)||0),0).toFixed(1),
  }),[filtered]);

  const memberSummary=useMemo(()=>{
    const map={};
    MEMBERS.forEach(m=>map[m]={total:0,completed:0,blocked:0,inProgress:0,impact:0});
    items.forEach(i=>{
      if(!map[i.owner])map[i.owner]={total:0,completed:0,blocked:0,inProgress:0,impact:0};
      map[i.owner].total++;
      if(i.status==="Completed")map[i.owner].completed++;
      if(i.status==="Blocked")map[i.owner].blocked++;
      if(i.status==="In Progress")map[i.owner].inProgress++;
      map[i.owner].impact+=parseFloat(i.impact)||0;
    });
    return map;
  },[items]);

  function openAdd(){setForm({...EMPTY,startDate:todayStr});setEditId(null);setShowForm(true);}
  function openEdit(item){setForm({...item});setEditId(item.id);setShowForm(true);}

  async function save(){
    if(!form.title?.trim())return;
    setSaving(true);
    const row=editId?{...form,id:editId}:{...form,id:Date.now().toString()};
    try{
      if(editId){await dbUpdate(editId,row);setItems(items.map(i=>i.id===editId?row:i));}
      else{await dbInsert(row);setItems([row,...items]);}
      setShowForm(false);showToast(editId?"Updated!":"Added!");
    }catch(e){showToast("Save failed: "+e.message,"error");}
    setSaving(false);
  }

  async function remove(id){
    if(!window.confirm("Delete?"))return;
    try{await dbDelete(id);setItems(items.filter(i=>i.id!==id));showToast("Deleted.");}
    catch(e){showToast("Delete failed: "+e.message,"error");}
  }

  if(!user)return(
    <div style={S.loginWrap}>
      <div style={S.loginCard}>
        <div style={{...S.logoBox,width:56,height:56,margin:"0 auto 16px",fontSize:26,borderRadius:16}}>M</div>
        <div style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:4}}>Myntra RA</div>
        <div style={{fontSize:13,color:"#555",marginBottom:28}}>Program Tracker · Select your name</div>
        {MEMBERS.map(m=>(
          <button key={m} onClick={()=>setUser(m)}
            style={{width:"100%",background:"#161616",border:"1px solid #2a2a2a",color:"#ccc",padding:"11px 16px",borderRadius:10,fontSize:13,cursor:"pointer",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor="#e11d74";e.currentTarget.style.color="#fff";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="#2a2a2a";e.currentTarget.style.color="#ccc";}}>
            <span style={{fontWeight:600}}>{m}</span>
            <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:ROLES[m]==="admin"?"#2d0a1a":ROLES[m]==="edit"?"#0a2d1a":"#1a1a1a",color:ROLES[m]==="admin"?"#e11d74":ROLES[m]==="edit"?"#34d399":"#666",fontWeight:700,textTransform:"uppercase"}}>{ROLES[m]}</span>
          </button>
        ))}
      </div>
    </div>
  );

  return(
    <div style={S.wrap}>
      {toast&&<div style={{position:"fixed",top:20,right:20,zIndex:200,background:toast.type==="error"?"#3e1a1a":"#1a3e2a",border:`1px solid ${toast.type==="error"?"#f87171":"#34d399"}`,color:toast.type==="error"?"#f87171":"#34d399",padding:"12px 20px",borderRadius:12,fontSize:13,fontWeight:600,boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>{toast.type==="error"?"⚠ ":"✓ "}{toast.msg}</div>}

      {/* Header */}
      <div style={S.hdr}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={S.logoBox}>M</div>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:"#fff",letterSpacing:-0.5}}>Myntra RA · Program Tracker</div>
            <div style={{fontSize:12,color:"#888",marginTop:2}}>Revenue Assurance · {new Date().toLocaleDateString("en-IN",{month:"long",year:"numeric"})}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={loadData} style={{background:"transparent",border:"1px solid #2a2a2a",color:"#666",padding:"6px 12px",borderRadius:8,fontSize:12,cursor:"pointer"}}>↻ Refresh</button>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:13,fontWeight:600,color:"#e0e0e0"}}>{user}</div>
            <div style={{fontSize:11,color:isAdmin?"#e11d74":canEdit?"#34d399":"#666"}}>{role}</div>
          </div>
          <button onClick={()=>setUser(null)} style={{background:"transparent",border:"1px solid #2a2a2a",color:"#666",padding:"6px 12px",borderRadius:8,fontSize:12,cursor:"pointer"}}>Switch</button>
          {canEdit&&<button onClick={openAdd} style={S.addBtn}>+ Add Program</button>}
        </div>
      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:20}}>
        {[
          {label:"Total Programs",value:stats.total,color:"#e11d74"},
          {label:"In Progress",value:stats.inProgress,color:"#818cf8"},
          {label:"Blocked",value:stats.blocked,color:"#f87171"},
          {label:"Due Date Breached",value:stats.breached,color:"#fbbf24"},
          {label:"₹ Impact (Cr)",value:`₹${stats.impact}`,color:"#34d399"},
        ].map(s=>(
          <div key={s.label} style={S.statCard}>
            <div style={{position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:s.color,opacity:0.15,filter:"blur(20px)"}}/>
            <div style={{fontSize:24,fontWeight:800,color:s.color,marginBottom:4}}>{s.value}</div>
            <div style={{fontSize:11,color:"#666",textTransform:"uppercase",letterSpacing:1}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div style={S.filterBar}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {[["owner",["All",...MEMBERS]],["type",["All",...TYPES]],["status",["All",...STATUSES]]].map(([key,opts])=>(
            <select key={key} value={filters[key]} onChange={e=>setFilters(f=>({...f,[key]:e.target.value}))} style={S.sel}>
              {opts.map(o=><option key={o}>{o}</option>)}
            </select>
          ))}
        </div>
        <div style={{display:"flex",gap:6}}>
          {[["table","⊞ Table"],["board","⬜ Board"],["member","👤 By Member"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={vBtn(view===v)}>{l}</button>
          ))}
        </div>
      </div>

      {loading&&<Spin/>}

      {/* Table View */}
      {!loading&&view==="table"&&(
        <div style={S.tbl}>
          <table>
            <thead>
              <tr>{["Program","Type","Owner","Start Date","Due Date","Closed Date","Ageing","Status","Progress","₹ Impact","Comment","Risk/Blocker",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {filtered.map(item=>{
                const ac=getAutoComment(item);
                const ageing=getAgeing(item);
                return(
                  <React.Fragment key={item.id}>
                    <tr style={{background:hovId===item.id?"#161616":"transparent",cursor:"pointer",transition:"background 0.15s"}}
                      onMouseEnter={()=>setHovId(item.id)} onMouseLeave={()=>setHovId(null)}
                      onClick={()=>setExpandedId(expandedId===item.id?null:item.id)}>
                      <td style={{...S.td,maxWidth:200}}>
                        <div style={{fontWeight:600,color:"#e0e0e0"}}>{item.title}</div>
                        {item.notes&&<div style={{fontSize:11,color:"#555",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.notes}</div>}
                      </td>
                      <td style={S.td}><span style={badge(TYPE_COLORS[item.type])}>{item.type}</span></td>
                      <td style={{...S.td,whiteSpace:"nowrap"}}>{item.owner}</td>
                      <td style={{...S.td,fontSize:12,whiteSpace:"nowrap",color:"#aaa"}}>{fmtD(item.startDate)}</td>
                      <td style={{...S.td,fontSize:12,whiteSpace:"nowrap",color:item.dueDate&&new Date(item.dueDate)<new Date()&&item.status!=="Completed"?"#f87171":"#ccc"}}>{fmtD(item.dueDate)}</td>
                      <td style={{...S.td,fontSize:12,whiteSpace:"nowrap",color:"#34d399"}}>{fmtD(item.closedDate)}</td>
                      <td style={{...S.td,whiteSpace:"nowrap"}}>
                        <span style={{fontSize:12,fontWeight:600,color:ageing==="—"?"#555":parseInt(ageing)>30?"#f87171":parseInt(ageing)>14?"#fbbf24":"#34d399"}}>{ageing}</span>
                      </td>
                      <td style={S.td}>
                        <span style={{...badge(STATUS_COLORS[item.status]),display:"inline-flex",alignItems:"center",gap:5}}>
                          <span style={{width:6,height:6,borderRadius:"50%",background:STATUS_COLORS[item.status]?.dot,display:"inline-block"}}/>
                          {item.status}
                        </span>
                      </td>
                      <td style={S.td}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{width:50,background:"#222",borderRadius:4,height:4}}><div style={{width:`${item.progress}%`,background:"linear-gradient(90deg,#e11d74,#9333ea)",borderRadius:4,height:4}}/></div>
                          <span style={{fontSize:11,color:"#555"}}>{item.progress}%</span>
                        </div>
                      </td>
                      <td style={{...S.td,color:"#34d399",fontWeight:600,whiteSpace:"nowrap"}}>{item.impact?`₹${item.impact}Cr`:"—"}</td>
                      <td style={{...S.td,whiteSpace:"nowrap"}}>
                        <div>
                          <span style={{fontSize:11,padding:"3px 8px",borderRadius:12,background:ac.bg,color:ac.color,fontWeight:600,whiteSpace:"nowrap"}}>{ac.icon} {ac.label}</span>
                          {item.manualComment&&<div style={{fontSize:10,color:"#888",marginTop:3,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📝 {item.manualComment}</div>}
                        </div>
                      </td>
                      <td style={{...S.td,color:"#f87171",fontSize:12,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.riskBlocker||<span style={{color:"#333"}}>—</span>}</td>
                      <td style={S.td} onClick={e=>e.stopPropagation()}>
                        {canEdit&&<div style={{display:"flex",gap:8}}>
                          <button onClick={()=>openEdit(item)} style={{background:"none",border:"none",color:"#e11d74",cursor:"pointer",fontSize:12,fontWeight:600}}>Edit</button>
                          {isAdmin&&<button onClick={()=>remove(item.id)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:12}}>Del</button>}
                        </div>}
                      </td>
                    </tr>
                    {expandedId===item.id&&(
                      <tr><td colSpan={13} style={{padding:"12px 20px",background:"#0d0d0d",borderBottom:"1px solid #141414",fontSize:12,color:"#888"}}>
                        <strong style={{color:"#e11d74"}}>Notes:</strong> {item.notes||"None"} &nbsp;·&nbsp;
                        <strong style={{color:"#fbbf24"}}>Manual Comment:</strong> {item.manualComment||"None"} &nbsp;·&nbsp;
                        <strong style={{color:"#f87171"}}>Blocker:</strong> {item.riskBlocker||"None"} &nbsp;·&nbsp;
                        <strong style={{color:"#818cf8"}}>Ageing:</strong> {getAgeing(item)}
                      </td></tr>
                    )}
                  </React.Fragment>
                );
              })}
              {filtered.length===0&&<tr><td colSpan={13} style={{padding:48,textAlign:"center",color:"#333",fontSize:14}}>No programs found. Click "+ Add Program" to get started!</td></tr>}
            </tbody>
          </table>
        </div>
      )}

      {/* Board View */}
      {!loading&&view==="board"&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
          {STATUSES.map(s=>(
            <div key={s} style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <span style={badge(STATUS_COLORS[s])}>{s}</span>
                <span style={{fontSize:11,color:"#444",fontWeight:700}}>{filtered.filter(i=>i.status===s).length}</span>
              </div>
              {filtered.filter(i=>i.status===s).map(item=>{
                const ac=getAutoComment(item);
                return(
                  <div key={item.id} style={{background:"#161616",border:"1px solid #222",borderRadius:10,padding:12,marginBottom:8,cursor:"pointer"}}
                    onClick={()=>canEdit&&openEdit(item)}
                    onMouseEnter={e=>e.currentTarget.style.borderColor="#e11d74"}
                    onMouseLeave={e=>e.currentTarget.style.borderColor="#222"}>
                    <div style={{fontSize:13,fontWeight:600,color:"#e0e0e0",marginBottom:6}}>{item.title}</div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                      <span style={{fontSize:11,color:"#555"}}>{item.owner}</span>
                      {item.impact&&<span style={{fontSize:11,color:"#34d399",fontWeight:700}}>₹{item.impact}Cr</span>}
                    </div>
                    <div style={{marginBottom:6}}>
                      <span style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:ac.bg,color:ac.color,fontWeight:600}}>{ac.icon} {ac.label}</span>
                    </div>
                    <div style={{fontSize:11,color:"#555",marginBottom:4}}>⏱ Ageing: {getAgeing(item)}</div>
                    {item.riskBlocker&&<div style={{fontSize:11,color:"#f87171",marginBottom:4}}>⚠ {item.riskBlocker}</div>}
                    <div style={{background:"#222",borderRadius:4,height:3}}><div style={{width:`${item.progress}%`,background:"linear-gradient(90deg,#e11d74,#9333ea)",borderRadius:4,height:3}}/></div>
                  </div>
                );
              })}
              {filtered.filter(i=>i.status===s).length===0&&<p style={{fontSize:12,color:"#2a2a2a",textAlign:"center",padding:"20px 0"}}>Empty</p>}
            </div>
          ))}
        </div>
      )}

      {/* Member View */}
      {!loading&&view==="member"&&(
        <div>
          {MEMBERS.filter(m=>memberSummary[m]?.total>0).map(m=>{
            const ms=memberSummary[m];
            return(
              <div key={m} style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:20,marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,#e11d74,#9333ea)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:16,color:"#fff"}}>{m[0]}</div>
                    <div>
                      <div style={{fontWeight:700,color:"#e0e0e0",fontSize:15}}>{m}</div>
                      <div style={{fontSize:12,color:"#555"}}>{ms.total} programs · ₹{ms.impact.toFixed(1)}Cr impact</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    {[{v:ms.inProgress,c:"#818cf8",l:"In Progress"},{v:ms.blocked,c:"#f87171",l:"Blocked"},{v:ms.completed,c:"#34d399",l:"Done"}].map(x=>(
                      <div key={x.l} style={{textAlign:"center",background:"#161616",border:"1px solid #222",borderRadius:10,padding:"8px 14px"}}>
                        <div style={{fontSize:18,fontWeight:800,color:x.c}}>{x.v}</div>
                        <div style={{fontSize:10,color:"#555"}}>{x.l}</div>
                      </div>
                    ))}
                  </div>
                </div>
                {items.filter(i=>i.owner===m).map(item=>{
                  const ac=getAutoComment(item);
                  return(
                    <div key={item.id} style={{background:"#161616",border:"1px solid #1e1e1e",borderRadius:8,padding:"10px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
                        <span style={badge(TYPE_COLORS[item.type])}>{item.type}</span>
                        <span style={{fontSize:13,color:"#ccc",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</span>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                        <span style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:ac.bg,color:ac.color,fontWeight:600}}>{ac.icon} {ac.label}</span>
                        <span style={{fontSize:11,color:"#555"}}>⏱ {getAgeing(item)}</span>
                        <div style={{background:"#222",borderRadius:4,height:3,width:48}}><div style={{width:`${item.progress}%`,background:"linear-gradient(90deg,#e11d74,#9333ea)",borderRadius:4,height:3}}/></div>
                        <span style={badge(STATUS_COLORS[item.status])}>{item.status}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {/* Modal */}
      {showForm&&(
        <div style={S.overlay}>
          <div style={S.modal}>
            <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:20}}>{editId?"Edit Program":"Add New Program"}</div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div><label style={S.lbl}>Title *</label><input placeholder="Program title" value={form.title||""} onChange={e=>f("title",e.target.value)} style={S.inp}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div><label style={S.lbl}>Type</label><select value={form.type||""} onChange={e=>f("type",e.target.value)} style={S.inp}>{TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
                <div><label style={S.lbl}>Owner</label><select value={form.owner||""} onChange={e=>f("owner",e.target.value)} style={S.inp}>{MEMBERS.map(m=><option key={m}>{m}</option>)}</select></div>
              </div>
              {/* Date fields */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                <div><label style={S.lbl}>Start Date</label><input type="date" value={form.startDate||""} onChange={e=>f("startDate",e.target.value)} style={S.inp}/></div>
                <div><label style={S.lbl}>Due Date</label><input type="date" value={form.dueDate||""} onChange={e=>f("dueDate",e.target.value)} style={S.inp}/></div>
                <div><label style={S.lbl}>Closed Date</label><input type="date" value={form.closedDate||""} onChange={e=>f("closedDate",e.target.value)} style={S.inp}/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div><label style={S.lbl}>Status</label><select value={form.status||""} onChange={e=>f("status",e.target.value)} style={S.inp}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
                <div><label style={S.lbl}>₹ Impact (Cr)</label><input placeholder="e.g. 45" value={form.impact||""} onChange={e=>f("impact",e.target.value)} style={S.inp}/></div>
              </div>
              <div>
                <label style={S.lbl}>Progress</label>
                <div style={{display:"flex",alignItems:"center",gap:10,...S.inp,padding:"8px 14px"}}>
                  <input type="range" min="0" max="100" value={form.progress||0} onChange={e=>f("progress",parseInt(e.target.value))} style={{flex:1}}/>
                  <span style={{fontSize:13,color:"#e11d74",fontWeight:700,minWidth:36}}>{form.progress||0}%</span>
                </div>
              </div>
              {/* Auto comment preview */}
              <div style={{background:"#0d0d0d",borderRadius:10,padding:"10px 14px",border:"1px solid #1e1e1e"}}>
                <label style={S.lbl}>Auto Comment (based on dates)</label>
                <div style={{marginTop:4}}>
                  {(()=>{const ac=getAutoComment(form);return <span style={{fontSize:12,padding:"3px 10px",borderRadius:12,background:ac.bg,color:ac.color,fontWeight:600}}>{ac.icon} {ac.label}</span>;})()}
                </div>
              </div>
              <div><label style={S.lbl}>Manual Comment / Notes</label><textarea placeholder="Add any additional notes or comments..." rows={2} value={form.manualComment||""} onChange={e=>f("manualComment",e.target.value)} style={{...S.inp,resize:"none"}}/></div>
              <div><label style={S.lbl}>Risk / Blocker</label><input placeholder="Any risks or blockers?" value={form.riskBlocker||""} onChange={e=>f("riskBlocker",e.target.value)} style={S.inp}/></div>
              <div><label style={S.lbl}>Notes</label><textarea placeholder="Additional notes..." rows={2} value={form.notes||""} onChange={e=>f("notes",e.target.value)} style={{...S.inp,resize:"none"}}/></div>
            </div>
            <div style={{display:"flex",gap:12,marginTop:20}}>
              <button onClick={save} disabled={saving} style={{...S.saveBtn,opacity:saving?0.7:1}}>{saving?"Saving...":"Save Program"}</button>
              <button onClick={()=>setShowForm(false)} style={S.cancelBtn}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
