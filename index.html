// Comment types
const COMMENT_TYPES=["All","Closed within due date","Closed — due date breached","WIP — within due date","WIP — due date breached","Not Started"];
const COMMENT_META={
  "Closed within due date":{color:"#34d399",bg:"#1a3e2a",icon:"✅"},
  "Closed — due date breached":{color:"#fbbf24",bg:"#3e2a00",icon:"⚠️"},
  "WIP — within due date":{color:"#818cf8",bg:"#1a1a3e",icon:"🔵"},
  "WIP — due date breached":{color:"#f87171",bg:"#3e1a1a",icon:"🔴"},
  "Not Started":{color:"#aaa",bg:"#2a2a2a",icon:"⚪"},
};

function getAutoComment(item){
  const today=new Date();today.setHours(0,0,0,0);
  const due=item.dueDate?new Date(item.dueDate):null;
  const closed=item.closedDate?new Date(item.closedDate):null;
  if(due)due.setHours(0,0,0,0);
  if(closed)closed.setHours(0,0,0,0);
  if(item.status==="Not Started")return{label:"Not Started",...COMMENT_META["Not Started"]};
  if(item.status==="Completed"){
    if(!due||!closed)return{label:"Completed",color:"#34d399",bg:"#1a3e2a",icon:"✅"};
    if(closed<=due)return{label:"Closed within due date",...COMMENT_META["Closed within due date"]};
    return{label:"Closed — due date breached",...COMMENT_META["Closed — due date breached"]};
  }
  if(item.status==="In Progress"||item.status==="Blocked"){
    if(!due)return{label:"WIP — within due date",...COMMENT_META["WIP — within due date"]};
    if(today<=due)return{label:"WIP — within due date",...COMMENT_META["WIP — within due date"]};
    return{label:"WIP — due date breached",...COMMENT_META["WIP — due date breached"]};
  }
  return{label:"—",color:"#aaa",bg:"#2a2a2a",icon:""};
}

function getAgeing(item){
  const start=item.startDate?new Date(item.startDate):null;
  if(!start)return"—";
  const end=item.closedDate?new Date(item.closedDate):new Date();
  const days=Math.floor((end-start)/(1000*60*60*24));
  return days>=0?`${days}d`:"—";
}

// SVG Charts
function BarChartSVG({data,height=180}){
  const max=Math.max(...data.map(d=>d.value),1);
  const bw=Math.floor(280/data.length)-8;
  return(
    <svg width="100%" viewBox={`0 0 320 ${height+50}`} style={{overflow:"visible"}}>
      {[0,0.5,1].map((t,i)=>(
        <g key={i}>
          <line x1="30" y1={height-(t*height)+5} x2="310" y2={height-(t*height)+5} stroke="#1e1e1e" strokeWidth="1"/>
          <text x="25" y={height-(t*height)+9} fontSize="8" fill="#555" textAnchor="end">{Math.round(t*max)}</text>
        </g>
      ))}
      {data.map((d,i)=>{
        const h=Math.max((d.value/max)*height,d.value>0?4:0);
        const x=30+i*(bw+8);
        return(
          <g key={i}>
            <rect x={x} y={height-h+5} width={bw} height={h} fill={d.color} rx="3" opacity="0.9"/>
            <text x={x+bw/2} y={height-h} fontSize="9" fill={d.color} textAnchor="middle" fontWeight="700">{d.value}</text>
            <text x={x+bw/2} y={height+18} fontSize="8" fill="#666" textAnchor="middle">{d.label.length>10?d.label.substring(0,9)+"…":d.label}</text>
            <title>{d.label}: {d.value}</title>
          </g>
        );
      })}
    </svg>
  );
}

function HBarChartSVG({data,height=200}){
  const max=Math.max(...data.map(d=>d.total),1);
  const bh=22,gap=6;
  return(
    <svg width="100%" viewBox={`0 0 320 ${data.length*(bh+gap)+20}`}>
      {data.map((d,i)=>{
        const y=i*(bh+gap);
        const closedW=(d.closed/max)*220,breachW=(d.breached/max)*220,wipW=(d.wip/max)*220;
        return(
          <g key={i}>
            <text x="58" y={y+bh-6} fontSize="10" fill="#888" textAnchor="end">{d.name}</text>
            <rect x="62" y={y} width={Math.max(closedW,0)} height={bh/3} fill="#34d399" rx="2"/>
            <rect x="62" y={y+bh/3} width={Math.max(breachW,0)} height={bh/3} fill="#fbbf24" rx="2"/>
            <rect x="62" y={y+bh*2/3} width={Math.max(wipW,0)} height={bh/3} fill="#818cf8" rx="2"/>
            <text x={65+Math.max(closedW,breachW,wipW)} y={y+bh-6} fontSize="9" fill="#555">{d.total}</text>
          </g>
        );
      })}
      <g transform={`translate(62,${data.length*(bh+gap)+4})`}>
        {[["Closed OK","#34d399"],["Breached","#fbbf24"],["WIP","#818cf8"]].map(([l,c],i)=>(
          <g key={i} transform={`translate(${i*76},0)`}>
            <rect x="0" y="-5" width="7" height="7" fill={c} rx="1"/>
            <text x="9" y="1" fontSize="8" fill="#666">{l}</text>
          </g>
        ))}
      </g>
    </svg>
  );
}

function LineChartSVG({data,height=160}){
  const max=Math.max(...data.map(d=>d.total),1);
  const w=280,pts=data.length;
  const xStep=pts>1?w/(pts-1):w/2;
  return(
    <svg width="100%" viewBox={`0 0 320 ${height+30}`} style={{overflow:"visible"}}>
      {[0,0.5,1].map((t,i)=>(
        <line key={i} x1="30" y1={height-(t*height)+5} x2="310" y2={height-(t*height)+5} stroke="#1e1e1e" strokeWidth="1"/>
      ))}
      {[["total","#e11d74"],["closed","#34d399"],["breached","#fbbf24"]].map(([key,color])=>{
        const points=data.map((d,i)=>`${30+i*xStep},${height-(((d[key]||0)/max)*height)+5}`).join(" ");
        return(
          <g key={key}>
            <polyline points={points} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
            {data.map((d,i)=><circle key={i} cx={30+i*xStep} cy={height-(((d[key]||0)/max)*height)+5} r="3" fill={color}><title>{key}: {d[key]||0}</title></circle>)}
          </g>
        );
      })}
      {data.map((d,i)=><text key={i} x={30+i*xStep} y={height+18} fontSize="8" fill="#555" textAnchor="middle">{d.month}</text>)}
      <g transform={`translate(30,${height+26})`}>
        {[["Total","#e11d74"],["Closed OK","#34d399"],["Breached","#fbbf24"]].map(([l,c],i)=>(
          <g key={i} transform={`translate(${i*72},0)`}><line x1="0" y1="-3" x2="8" y2="-3" stroke={c} strokeWidth="2"/><text x="10" y="1" fontSize="8" fill="#666">{l}</text></g>
        ))}
      </g>
    </svg>
  );
}

function Bdg({m,children}){return <span style={{display:"inline-flex",alignItems:"center",gap:4,background:m?.bg||"#222",color:m?.text||"#aaa",padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:600}}>{children}</span>;}

function App(){
  const[user,setUser]=useState(null);
  const[items,setItems]=useState([]);
  const[loading,setLoading]=useState(false);
  const[showForm,setShowForm]=useState(false);
  const[editId,setEditId]=useState(null);
  const[form,setForm]=useState(EMPTY);
  const[filters,setFilters]=useState({owner:"All",type:"All",status:"All",comment:"All",month:"All",year:"All"});
  const[view,setView]=useState("table");
  const[expandedId,setExpandedId]=useState(null);
  const[hovId,setHovId]=useState(null);
  const[saving,setSaving]=useState(false);
  const[toast,setToast]=useState(null);

  const role=user?ROLES[user]:null,canEdit=role==="admin"||role==="edit",isAdmin=role==="admin";
  function showToast(msg,type="success"){setToast({msg,type});setTimeout(()=>setToast(null),3500);}
  function f(k,v){setForm(x=>({...x,[k]:v}));}

  const loadData=useCallback(async()=>{
    setLoading(true);
    try{const data=await dbGet();setItems(data||[]);}
    catch(e){showToast("Load failed: "+e.message,"error");}
    setLoading(false);
  },[]);

  useEffect(()=>{if(user)loadData();},[user]);

  // Filter by start date month/year
  const filtered=useMemo(()=>items.filter(i=>{
    const ac=getAutoComment(i);
    const monthMatch=filters.month==="All"||(i.controlMonth===filters.month);
    const yearMatch=filters.year==="All"||(i.controlYear===filters.year);
    return(
      (filters.owner==="All"||i.owner===filters.owner)&&
      (filters.type==="All"||i.type===filters.type)&&
      (filters.status==="All"||i.status===filters.status)&&
      (filters.comment==="All"||ac.label===filters.comment)&&
      monthMatch&&yearMatch
    );
  }),[items,filters]);

  // Stats — clean definitions
  const stats=useMemo(()=>({
    total:filtered.length,
    open:filtered.filter(i=>i.status==="Not Started").length,
    wip:filtered.filter(i=>i.status==="In Progress"||i.status==="Blocked").length,
    closed:filtered.filter(i=>i.status==="Completed").length,
    closedOK:filtered.filter(i=>getAutoComment(i).label==="Closed within due date").length,
    breached:filtered.filter(i=>getAutoComment(i).label.includes("breached")).length,
  }),[filtered]);

  // Chart data — all driven by filtered
  const statusChartData=useMemo(()=>[
    {label:"Open",value:filtered.filter(i=>i.status!=="Completed").length,color:"#818cf8"},
    {label:"Closed OK",value:filtered.filter(i=>getAutoComment(i).label==="Closed within due date").length,color:"#34d399"},
    {label:"Breached",value:filtered.filter(i=>getAutoComment(i).label.includes("breached")).length,color:"#fbbf24"},
    {label:"WIP",value:filtered.filter(i=>getAutoComment(i).label.includes("WIP")).length,color:"#e11d74"},
  ],[filtered]);

  const memberBreachData=useMemo(()=>MEMBERS.map(m=>({
    name:m.split(" ")[0],
    total:filtered.filter(i=>i.owner===m).length,
    closed:filtered.filter(i=>i.owner===m&&getAutoComment(i).label==="Closed within due date").length,
    breached:filtered.filter(i=>i.owner===m&&getAutoComment(i).label.includes("breached")).length,
    wip:filtered.filter(i=>i.owner===m&&getAutoComment(i).label.includes("WIP")).length,
  })).filter(m=>m.total>0),[filtered]);

  // Trend — if a specific year is selected show all 12 months of that year,
  // otherwise show last 6 months across years
  const trendData=useMemo(()=>{
    let periods=[];
    if(filters.year!=="All"){
      periods=MONTHS.map(m=>({m,y:filters.year}));
    } else {
      const all=[...MONTHS.map(m=>({m,y:"2025"})),...MONTHS.map(m=>({m,y:"2026"}))];
      const todayIdx=all.findIndex(x=>x.m===MONTHS[today.getMonth()]&&x.y===String(today.getFullYear()));
      periods=all.slice(Math.max(0,todayIdx-5),todayIdx+1);
    }
    return periods.map(({m,y})=>{
      const its=filtered.filter(i=>i.controlMonth===m&&i.controlYear===y);
      return{month:m,total:its.length,closed:its.filter(i=>getAutoComment(i).label==="Closed within due date").length,breached:its.filter(i=>getAutoComment(i).label.includes("breached")).length};
    });
  },[filtered,filters.year]);

  const memberSummary=useMemo(()=>{
    const map={};
    MEMBERS.forEach(m=>map[m]={total:0,completed:0,blocked:0,inProgress:0,impact:0});
    items.forEach(i=>{
      if(!map[i.owner])map[i.owner]={total:0,completed:0,blocked:0,inProgress:0,impact:0};
      map[i.owner].total++;
      if(i.status==="Completed")map[i.owner].completed++;
      if(i.status==="Blocked")map[i.owner].blocked++;
      if(i.status==="In Progress")map[i.owner].inProgress++;
      map[i.owner].impact+=parseFloat(i.impact)||0;
    });
    return map;
  },[items]);

  function openAdd(){setForm({...EMPTY,startDate:todayStr});setEditId(null);setShowForm(true);}
  function openEdit(item){setForm({...item});setEditId(item.id);setShowForm(true);}

  async function save(){
    if(!form.title?.trim())return;
    setSaving(true);
    const row=editId?{...form,id:editId}:{...form,id:Date.now().toString()};
    try{
      if(editId){await dbUpdate(editId,row);setItems(items.map(i=>i.id===editId?row:i));}
      else{await dbInsert(row);setItems([row,...items]);}
      setShowForm(false);showToast(editId?"Updated!":"Added!");
    }catch(e){showToast("Save failed: "+e.message,"error");}
    setSaving(false);
  }

  async function remove(id){
    if(!window.confirm("Delete?"))return;
    try{await dbDelete(id);setItems(items.filter(i=>i.id!==id));showToast("Deleted.");}
    catch(e){showToast("Delete failed: "+e.message,"error");}

  if(!user)return(
    <div style={S.loginWrap}>

        <div style={{fontSize:22,fontWeight:800,color:"#fff",marginBottom:4}}>Myntra RA</div>
        <div style={{fontSize:13,color:"#555",marginBottom:28}}>Program Tracker · Select your name</div>
        {MEMBERS.map(m=>(
          <button key={m} onClick={()=>setUser(m)}
            style={{width:"100%",background:"#161616",border:"1px solid #2a2a2a",color:"#ccc",padding:"11px 16px",borderRadius:10,fontSize:13,cursor:"pointer",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor="#e11d74";e.currentTarget.style.color="#fff";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="#2a2a2a";e.currentTarget.style.color="#ccc";}}>
            <span style={{fontWeight:600}}>{m}</span>
            <span style={{fontSize:10,padding:"2px 8px",borderRadius:20,background:ROLES[m]==="admin"?"#2d0a1a":ROLES[m]==="edit"?"#0a2d1a":"#1a1a1a",color:ROLES[m]==="admin"?"#e11d74":ROLES[m]==="edit"?"#34d399":"#666",fontWeight:700,textTransform:"uppercase"}}>{ROLES[m]}</span>
          </button>
        ))}
      </div>
    </div>
  );

  return(
    <div style={S.wrap}>
      {toast&&<div style={{position:"fixed",top:20,right:20,zIndex:200,background:toast.type==="error"?"#3e1a1a":"#1a3e2a",border:`1px solid ${toast.type==="error"?"#f87171":"#34d399"}`,color:toast.type==="error"?"#f87171":"#34d399",padding:"12px 20px",borderRadius:12,fontSize:13,fontWeight:600,boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>{toast.type==="error"?"⚠ ":"✓ "}{toast.msg}</div>}

      {/* Header */}
      <div style={S.hdr}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={S.logoBox}>M</div>
          <div>
            <div style={{fontSize:20,fontWeight:800,color:"#fff",letterSpacing:-0.5}}>Myntra RA · Program Tracker</div>
            <div style={{fontSize:12,color:"#888",marginTop:2}}>Revenue Assurance · {new Date().toLocaleDateString("en-IN",{month:"long",year:"numeric"})}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",background:"#161616",borderRadius:10,padding:3,gap:1}}>
            {TABS.map(t=><button key={t.id} onClick={()=>setView(t.id)} style={vBtn(view===t.id)}>{t.l}</button>)}
          </div>
          <button onClick={loadData} style={{background:"transparent",border:"1px solid #2a2a2a",color:"#666",padding:"7px 12px",borderRadius:8,fontSize:12,cursor:"pointer"}}>↻</button>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:13,fontWeight:600,color:"#e0e0e0"}}>{user}</div>
            <div style={{fontSize:11,color:isAdmin?"#e11d74":canEdit?"#34d399":"#666"}}>{role}</div>
          </div>
          <button onClick={()=>setUser(null)} style={{background:"transparent",border:"1px solid #2a2a2a",color:"#666",padding:"6px 10px",borderRadius:8,fontSize:11,cursor:"pointer"}}>Switch</button>
          {canEdit&&<button onClick={openAdd} style={S.addBtn}>+ Add Program</button>}
        </div>
      </div>

      {/* Stats — interactive cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:12,marginBottom:20}}>
        {[
          {id:"total",  label:"Total",      value:stats.total,    color:"#e11d74"},
          {id:"open",   label:"Open",       value:stats.open,     color:"#94a3b8"},
          {id:"wip",    label:"WIP",        value:stats.wip,      color:"#818cf8"},
          {id:"closed", label:"Closed",     value:stats.closed,   color:"#34d399"},
          {id:"closedOK",label:"Closed OK", value:stats.closedOK, color:"#34d399"},
          {id:"breached",label:"Breached",  value:stats.breached, color:"#fbbf24"},
        ].map(s=>{
          const isActive=activeStat===s.id;
          return(
            <div key={s.id} onClick={()=>handleStatClick(s.id)}
              style={{...S.card,padding:"14px 16px",position:"relative",overflow:"hidden",cursor:"pointer",
                border:`1px solid ${isActive?s.color:"#1e1e1e"}`,
                boxShadow:isActive?`0 0 16px ${s.color}40`:"none",
                transform:isActive?"translateY(-2px)":"none",
                transition:"all 0.2s"}}>
              <div style={{position:"absolute",top:-15,right:-15,width:60,height:60,borderRadius:"50%",background:s.color,opacity:isActive?0.25:0.12,filter:"blur(16px)"}}/>
              <div style={{fontSize:22,fontWeight:800,color:s.color,marginBottom:2}}>{s.value}</div>
              <div style={{fontSize:10,color:isActive?s.color:"#555",textTransform:"uppercase",letterSpacing:1,fontWeight:isActive?700:400}}>{s.label}</div>
              {isActive&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:s.color,borderRadius:"0 0 14px 14px"}}/>}
            </div>
          );
        })}
      </div>

      {/* Filters */}
      <div style={{...S.card,padding:"14px 20px",marginBottom:20,display:"flex",alignItems:"center",flexWrap:"wrap",gap:10}}>
        {/* Month multi-select row */}
        <div style={{display:"flex",gap:4,flexWrap:"wrap",flex:1}}>
          {["All",...MONTHS].map(m=>(
            <button key={m} onClick={()=>setFilters(f=>({...f,month:m}))}
              style={{padding:"5px 10px",borderRadius:20,border:`1px solid ${filters.month===m?"#e11d74":"#2a2a2a"}`,background:filters.month===m?"#2d0a1a":"transparent",color:filters.month===m?"#e11d74":"#555",fontSize:11,fontWeight:600,cursor:"pointer"}}>
              {m}
            </button>
          ))}
        </div>
        {/* Year, Owner, Type, Status, Comment dropdowns */}
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <select value={filters.year} onChange={e=>setFilters(f=>({...f,year:e.target.value}))} style={S.sel}>
            {["All",...YEARS].map(y=><option key={y}>{y}</option>)}
          </select>
          {[["owner",["All",...MEMBERS]],["type",["All",...TYPES]],["status",["All",...STATUSES]]].map(([key,opts])=>(
            <select key={key} value={filters[key]} onChange={e=>setFilters(f=>({...f,[key]:e.target.value}))} style={S.sel}>
              {opts.map(o=><option key={o}>{o}</option>)}
            </select>
          ))}
          <select value={filters.comment} onChange={e=>setFilters(f=>({...f,comment:e.target.value}))} style={{...S.sel,minWidth:180}}>
            {COMMENT_TYPES.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
      </div>

      {loading&&<Spin/>}

      {/* TABLE */}
      {!loading&&view==="table"&&(
        <div style={{...S.card,overflowX:"auto"}}>
          <table style={{minWidth:1350}}>
            <thead>
              <tr>{["Program","Type","Owner","Control Month","Start","Due Date","Closed","Ageing","Status","Progress","₹ Impact","Comment","Blocker",""].map(h=><th key={h} style={S.th}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {filteredByActive.map(item=>{
                const ac=getAutoComment(item);
                const ageing=getAgeing(item);
                const ageNum=parseInt(ageing);
                return(
                  <React.Fragment key={item.id}>
                    <tr style={{background:hovId===item.id?"#161616":"transparent",cursor:"pointer"}}
                      onMouseEnter={()=>setHovId(item.id)} onMouseLeave={()=>setHovId(null)}
                      onClick={()=>setExpandedId(expandedId===item.id?null:item.id)}>
                      <td style={{...S.td,maxWidth:180,fontWeight:600,color:"#e0e0e0"}}>
                        {item.title}
                        {item.notes&&<div style={{fontSize:10,color:"#555",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.notes}</div>}
                      </td>
                      <td style={S.td}><Bdg m={TYPE_COLORS[item.type]}>{item.type}</Bdg></td>
                      <td style={{...S.td,whiteSpace:"nowrap"}}>{item.owner}</td>
                      <td style={{...S.td,whiteSpace:"nowrap"}}>
                        <span style={{fontSize:12,fontWeight:700,color:"#e11d74"}}>{item.controlMonth||"—"}</span>
                        <span style={{fontSize:11,color:"#555",marginLeft:4}}>{item.controlYear||""}</span>
                      </td>
                      <td style={{...S.td,fontSize:11,whiteSpace:"nowrap",color:"#888"}}>{fmtD(item.startDate)}</td>
                      <td style={{...S.td,fontSize:11,whiteSpace:"nowrap",color:item.dueDate&&new Date(item.dueDate)<new Date()&&item.status!=="Completed"?"#f87171":"#ccc"}}>{fmtD(item.dueDate)}</td>
                      <td style={{...S.td,fontSize:11,whiteSpace:"nowrap",color:"#34d399"}}>{fmtD(item.closedDate)}</td>
                      <td style={{...S.td,whiteSpace:"nowrap"}}>
                        <span style={{fontSize:12,fontWeight:700,color:ageing==="—"?"#555":ageNum>30?"#f87171":ageNum>14?"#fbbf24":"#34d399"}}>{ageing}</span>
                      </td>
                      <td style={S.td}><Bdg m={STATUS_COLORS[item.status]}><Dot m={STATUS_COLORS[item.status]}/>{item.status}</Bdg></td>
                      <td style={S.td}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:46,background:"#222",borderRadius:4,height:4}}><div style={{width:`${item.progress||0}%`,background:"linear-gradient(90deg,#e11d74,#9333ea)",borderRadius:4,height:4}}/></div>
                          <span style={{fontSize:10,color:"#555"}}>{item.progress||0}%</span>
                        </div>
                      </td>
                      <td style={{...S.td,color:"#34d399",fontWeight:600,whiteSpace:"nowrap"}}>{item.impact?`₹${item.impact}Cr`:"—"}</td>
                      <td style={{...S.td,whiteSpace:"nowrap"}}>
                        <div>
                          <span style={{fontSize:11,padding:"3px 8px",borderRadius:12,background:ac.bg,color:ac.color,fontWeight:600}}>{ac.icon} {ac.label}</span>
                          {item.manualComment&&<div style={{fontSize:10,color:"#888",marginTop:3,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📝 {item.manualComment}</div>}
                        </div>
                      </td>
                      <td style={{...S.td,color:"#f87171",fontSize:11,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.riskBlocker||<span style={{color:"#333"}}>—</span>}</td>
                      <td style={S.td} onClick={e=>e.stopPropagation()}>
                        {canEdit&&<div style={{display:"flex",gap:8}}>
                          <button onClick={()=>openEdit(item)} style={{background:"none",border:"none",color:"#e11d74",cursor:"pointer",fontSize:11,fontWeight:600}}>Edit</button>
                          {isAdmin&&<button onClick={()=>remove(item.id)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:11}}>Del</button>}
                        </div>}
                      </td>
                    </tr>
                    {expandedId===item.id&&(
                      <tr><td colSpan={13} style={{padding:"10px 16px",background:"#0d0d0d",borderBottom:"1px solid #141414",fontSize:11,color:"#888"}}>
                        <strong style={{color:"#e11d74"}}>Notes:</strong> {item.notes||"None"} &nbsp;·&nbsp;
                        <strong style={{color:"#fbbf24"}}>Comment:</strong> {item.manualComment||"None"} &nbsp;·&nbsp;
                        <strong style={{color:"#f87171"}}>Blocker:</strong> {item.riskBlocker||"None"} &nbsp;·&nbsp;
                        <strong style={{color:"#818cf8"}}>Ageing:</strong> {ageing}
                      </td></tr>
                    )}
                  </React.Fragment>
                );
              })}
              {filteredByActive.length===0&&<tr><td colSpan={13} style={{padding:48,textAlign:"center",color:"#333"}}>No programs found.</td></tr>}
            </tbody>
          </table>
        </div>
      )}

      {/* CHARTS */}
      {!loading&&view==="charts"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
            <div style={{...S.card,padding:20}}>
              <div style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:4}}>📊 Program Status Breakdown</div>
              <div style={{fontSize:11,color:"#555",marginBottom:14}}>Based on current filters</div>
              <BarChartSVG data={statusChartData}/>
            </div>
            <div style={{...S.card,padding:20}}>
              <div style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:4}}>📈 Trend — Last 6 Months</div>
              <div style={{fontSize:11,color:"#555",marginBottom:14}}>Total · Closed OK · Breached</div>
              <LineChartSVG data={trendData}/>
            </div>
          </div>
          <div style={{...S.card,padding:20}}>
            <div style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:4}}>👤 Breaches by Team Member</div>
            <div style={{fontSize:11,color:"#555",marginBottom:14}}>Closed OK vs Breached vs WIP</div>
            {memberBreachData.length===0?<div style={{textAlign:"center",color:"#333",padding:"40px 0"}}>No data</div>:<HBarChartSVG data={memberBreachData}/>}
          </div>
        </div>
      )}

      {/* BOARD */}
      {!loading&&view==="board"&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
          {STATUSES.map(s=>(
            <div key={s} style={{...S.card,padding:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <Bdg m={STATUS_COLORS[s]}>{s}</Bdg>
                <span style={{fontSize:11,color:"#444",fontWeight:700}}>{filteredByActive.filter(i=>i.status===s).length}</span>
              </div>
              {filteredByActive.filter(i=>i.status===s).map(item=>{
                const ac=getAutoComment(item);
                return(
                  <div key={item.id} style={{background:"#161616",border:"1px solid #222",borderRadius:10,padding:12,marginBottom:8,cursor:"pointer"}}
                    onClick={()=>canEdit&&openEdit(item)}
                    onMouseEnter={e=>e.currentTarget.style.borderColor="#e11d74"}
                    onMouseLeave={e=>e.currentTarget.style.borderColor="#222"}>
                    <div style={{fontSize:13,fontWeight:600,color:"#e0e0e0",marginBottom:6}}>{item.title}</div>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                      <span style={{fontSize:11,color:"#555"}}>{item.owner}</span>
                      {item.impact&&<span style={{fontSize:11,color:"#34d399",fontWeight:700}}>₹{item.impact}Cr</span>}
                    </div>
                    <span style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:ac.bg,color:ac.color,fontWeight:600}}>{ac.icon} {ac.label}</span>
                    <div style={{fontSize:10,color:"#555",marginTop:4}}>⏱ {getAgeing(item)}</div>
                    {item.riskBlocker&&<div style={{fontSize:10,color:"#f87171",marginTop:4}}>⚠ {item.riskBlocker}</div>}
                    <div style={{background:"#222",borderRadius:3,height:3,marginTop:6}}><div style={{width:`${item.progress||0}%`,background:"linear-gradient(90deg,#e11d74,#9333ea)",borderRadius:3,height:3}}/></div>
                  </div>
                );
              })}
              {filteredByActive.filter(i=>i.status===s).length===0&&<p style={{fontSize:11,color:"#2a2a2a",textAlign:"center",padding:"16px 0"}}>Empty</p>}
            </div>
          ))}
        </div>
      )}

      {/* MEMBER */}
      {!loading&&view==="member"&&(
        <div>
          {MEMBERS.filter(m=>memberSummary[m]?.total>0).map(m=>{
            const ms=memberSummary[m];
            const mBreached=items.filter(i=>i.owner===m&&getAutoComment(i).label.includes("breached")).length;
            return(
              <div key={m} style={{...S.card,padding:20,marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,#e11d74,#9333ea)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:16,color:"#fff"}}>{m[0]}</div>
                    <div>
                      <div style={{fontWeight:700,color:"#e0e0e0",fontSize:15}}>{m}</div>
                      <div style={{fontSize:12,color:"#555"}}>{ms.total} programs · ₹{ms.impact.toFixed(1)}Cr · {mBreached} breach{mBreached!==1?"es":""}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    {[{v:ms.inProgress,c:"#818cf8",l:"WIP"},{v:ms.blocked,c:"#f87171",l:"Blocked"},{v:ms.completed,c:"#34d399",l:"Done"},{v:mBreached,c:"#fbbf24",l:"Breached"}].map(x=>(
                      <div key={x.l} style={{textAlign:"center",background:"#161616",border:"1px solid #222",borderRadius:10,padding:"8px 12px"}}>
                        <div style={{fontSize:18,fontWeight:800,color:x.c}}>{x.v}</div>
                        <div style={{fontSize:10,color:"#555"}}>{x.l}</div>
                      </div>
                    ))}
                  </div>
                </div>
                {items.filter(i=>i.owner===m).map(item=>{
                  const ac=getAutoComment(item);
                  return(
                    <div key={item.id} style={{background:"#161616",border:"1px solid #1e1e1e",borderRadius:8,padding:"9px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
                        <Bdg m={TYPE_COLORS[item.type]}>{item.type}</Bdg>
                        <span style={{fontSize:12,color:"#ccc",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</span>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                        <span style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:ac.bg,color:ac.color,fontWeight:600}}>{ac.icon} {ac.label}</span>
                        <span style={{fontSize:10,color:"#555"}}>⏱ {getAgeing(item)}</span>
                        <Bdg m={STATUS_COLORS[item.status]}>{item.status}</Bdg>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {/* MODAL */}
      {showForm&&(
        <div style={S.overlay}>
          <div style={S.modal}>
            <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:20}}>{editId?"Edit Program":"Add New Program"}</div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div><label style={S.lbl}>Title *</label><input placeholder="Program title" value={form.title||""} onChange={e=>f("title",e.target.value)} style={S.inp}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div><label style={S.lbl}>Type</label><select value={form.type||""} onChange={e=>f("type",e.target.value)} style={S.inp}>{TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
                <div><label style={S.lbl}>Owner</label><select value={form.owner||""} onChange={e=>f("owner",e.target.value)} style={S.inp}>{MEMBERS.map(m=><option key={m}>{m}</option>)}</select></div>
              </div>
              {/* Control Month */}
              <div>
                <label style={S.lbl}>Program / Control Month</label>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <select value={form.controlMonth||""} onChange={e=>f("controlMonth",e.target.value)} style={S.inp}>
                    {MONTHS.map(m=><option key={m}>{m}</option>)}
                  </select>
                  <input placeholder="Year e.g. 2026" value={form.controlYear||""} onChange={e=>f("controlYear",e.target.value)} style={S.inp} maxLength={4}/>
                </div>
                <div style={{fontSize:10,color:"#555",marginTop:4}}>This is the month this program/control belongs to — drives charts and filters</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                <div><label style={S.lbl}>Start Date</label><input type="date" value={form.startDate||""} onChange={e=>f("startDate",e.target.value)} style={S.inp}/></div>
                <div><label style={S.lbl}>Due Date</label><input type="date" value={form.dueDate||""} onChange={e=>f("dueDate",e.target.value)} style={S.inp}/></div>
                <div><label style={S.lbl}>Closed Date</label><input type="date" value={form.closedDate||""} onChange={e=>f("closedDate",e.target.value)} style={S.inp}/></div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div><label style={S.lbl}>Status</label><select value={form.status||""} onChange={e=>f("status",e.target.value)} style={S.inp}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></div>
                <div><label style={S.lbl}>₹ Impact (Cr)</label><input placeholder="e.g. 45" value={form.impact||""} onChange={e=>f("impact",e.target.value)} style={S.inp}/></div>
              </div>
              <div>
                <label style={S.lbl}>Progress</label>
                <div style={{display:"flex",alignItems:"center",gap:10,...S.inp,padding:"8px 14px"}}>
                  <input type="range" min="0" max="100" value={form.progress||0} onChange={e=>f("progress",parseInt(e.target.value))} style={{flex:1}}/>
                  <span style={{fontSize:13,color:"#e11d74",fontWeight:700,minWidth:36}}>{form.progress||0}%</span>
                </div>
              </div>
              <div style={{background:"#0d0d0d",borderRadius:10,padding:"10px 14px",border:"1px solid #1e1e1e"}}>
                <label style={S.lbl}>Auto Comment Preview</label>
                {(()=>{const ac=getAutoComment(form);return <span style={{fontSize:12,padding:"3px 10px",borderRadius:12,background:ac.bg,color:ac.color,fontWeight:600}}>{ac.icon} {ac.label}</span>;})()}
              </div>
              <div><label style={S.lbl}>Manual Comment</label><textarea placeholder="Additional notes..." rows={2} value={form.manualComment||""} onChange={e=>f("manualComment",e.target.value)} style={{...S.inp,resize:"none"}}/></div>
              <div><label style={S.lbl}>Risk / Blocker</label><input placeholder="Any risks or blockers?" value={form.riskBlocker||""} onChange={e=>f("riskBlocker",e.target.value)} style={S.inp}/></div>
              <div><label style={S.lbl}>Notes</label><textarea placeholder="Additional notes..." rows={2} value={form.notes||""} onChange={e=>f("notes",e.target.value)} style={{...S.inp,resize:"none"}}/></div>
            </div>
            <div style={{display:"flex",gap:12,marginTop:20}}>
              <button onClick={save} disabled={saving} style={{...S.saveBtn,opacity:saving?0.7:1}}>{saving?"Saving...":"Save Program"}</button>
              <button onClick={()=>setShowForm(false)} style={S.cancelBtn}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
